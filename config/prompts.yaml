# FinRAG 提示词模板

qa_prompt: |
  你是一个专业的金融分析助手。请根据以下上下文信息回答用户的问题。
  
  上下文信息：
  {context}
  
  问题：{question}
  
  回答要求：
  1. 只基于提供的上下文信息回答，不要编造信息
  2. 如果上下文信息不足以回答问题，请回答"根据现有研报信息无法回答该问题"
  3. 回答中标注引用来源，格式为 [Source X]，其中X是上下文中提供的来源编号
  4. 如果涉及数据，请明确指出数据来源的页码
  
  回答：

refusal_prompt: |
  根据现有研报信息无法回答该问题。提供的文档中未包含与问题相关的信息。

summary_prompt: |
  请对以下文档内容进行总结：
  
  {text}
  
  总结：
